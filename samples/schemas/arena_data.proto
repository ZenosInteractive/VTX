// arena_data.proto — Arena game data schema.
//
// Defines the serialization format for the arena game's OWN data model.
// This is NOT the VTX format — it represents what a game engine would produce
// as raw replay data before it gets mapped into VTX PropertyContainers.

syntax = "proto3";
package arena_pb;

option optimize_for = SPEED;

// ---- Math types ----

message Vec3 {
    double x = 1;
    double y = 2;
    double z = 3;
}

message Rotation {
    float x = 1;
    float y = 2;
    float z = 3;
    float w = 4;
}

// ---- Game entities ----

message Player {
    string unique_id = 1;
    string name      = 2;
    int32  team      = 3;
    float  health    = 4;
    float  armor     = 5;
    Vec3     position = 6;
    Rotation rotation = 7;
    Vec3     velocity = 8;
    bool   is_alive  = 9;
    int32  score     = 10;
    int32  deaths    = 11;
}

message Projectile {
    string unique_id = 1;
    string owner_id  = 2;
    Vec3   position  = 3;
    Vec3   velocity  = 4;
    float  damage    = 5;
    string type      = 6;
}

message MatchState {
    int32  score_team1    = 1;
    int32  score_team2    = 2;
    int32  round          = 3;
    string phase          = 4;
    float  time_remaining = 5;
}

// ---- Frame & replay ----

message FrameData {
    int32  frame_index = 1;
    float  game_time   = 2;
    int64  utc_ticks   = 3;
    repeated Player     players     = 4;
    repeated Projectile projectiles = 5;
    MatchState          match_state = 6;
}

message ArenaReplay {
    string replay_name      = 1;
    int32  total_frames     = 2;
    int32  fps              = 3;
    double duration_seconds = 4;
    repeated FrameData frames = 5;
}
